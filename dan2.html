<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dan!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 3D Glowing Grid Background */
        .grid-bg {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(75deg);
            animation: moveGrid 5s linear infinite;
            z-index: 0;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(40px); }
        }

        .content-box {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 15, 0.85);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(0, 212, 255, 0.2);
            text-align: center;
            max-width: 550px;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #00d4ff;
            font-size: 2.5rem;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00d4ff;
        }

        p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cccccc;
        }

        .accent {
            color: #ff007f;
            font-weight: bold;
            text-shadow: 0 0 5px #ff007f;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="content-box">
        <h1>Happy Birthday,<br>Dan!</h1>
        <p>I know things have been heavy lately, but you aren't carrying it all alone. Your presence matters a lot, and I appreciate you.</p>
        <p>I hope today brings you <span class="accent">peace</span>, <span class="accent">comfort</span>, and a reminder of how awesome you are.</p>
        <p>Take it easy today—you deserve the best!</p>
    </div>

</body>
</html>
